<section class="section" style="padding-top: 140px;">
  <div class="container">
    <div class="section-header">
      <h1>Submit a Geometric Tattoo Artist</h1>
      <p>Know a geometric tattoo artist who deserves to be featured? Let us know.</p>
      <div class="section-divider"></div>
    </div>

    <form class="submit-form" action="https://formspree.io/f/xgegebgb" method="POST">
      <div class="form-group">
        <label for="artist-name">Artist Name</label>
        <input type="text" id="artist-name" name="artist_name" placeholder="e.g. Jane Doe" required>
      </div>
      <div class="form-group">
        <label for="instagram">Instagram Handle</label>
        <input type="text" id="instagram" name="instagram" placeholder="@handle" required>
      </div>
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="City, Country" required>
      </div>
      <div class="form-group">
        <label for="styles">Style Tags</label>
        <input type="text" id="styles" name="styles" placeholder="e.g. sacred geometry, dotwork, mandala">
      </div>
      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="notes">Additional Notes</label>
        <textarea id="notes" name="notes" placeholder="Anything else we should know about this artist?"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Submit Artist</button>
    </form>
  </div>
</section>
