<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas | OMF Geometry</title>
<link rel="stylesheet" href="css/monolith.css">
<style>
  .atlas-hero {
    padding: clamp(56px, 8vw, 120px) var(--gutter) clamp(28px, 4vw, 56px);
    border-bottom: 1px solid var(--rule-strong);
  }
  .atlas-hero h1 {
    font: italic 400 clamp(56px, 9vw, 144px)/0.92 var(--serif);
    color: var(--text-bright);
    letter-spacing: -0.03em;
  }
  .atlas-hero h1 b { font-style: normal; font-weight: 400; }
  .atlas-hero p {
    margin-top: 24px;
    font: italic 400 clamp(18px, 2vw, 24px)/1.4 var(--serif);
    color: var(--text-bright);
    max-width: 56ch;
  }
  .atlas-section { padding: clamp(32px, 4vw, 56px) var(--gutter) clamp(60px,7vw,120px); }
  .atlas-cap {
    margin-top: 12px;
    font: 400 11px/1.5 var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-mute);
    text-align: center;
  }
  .stage-list { display: none; }
  .selected-panel { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--rule-strong); }
  .selected-panel h3 { font: italic 400 clamp(28px,3vw,40px)/1 var(--serif); color: var(--text-bright); }
  .selected-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-top: 24px;
  }
  .selected-card {
    background: var(--ink);
    aspect-ratio: 4/5;
    position: relative;
    overflow: hidden;
    color: inherit;
  }
  .selected-card img { width:100%;height:100%;object-fit:cover;filter:grayscale(0.15);transition: transform .5s; }
  .selected-card:hover img { transform: scale(1.04); filter: grayscale(0); }
  .selected-card__cap {
    position:absolute;left:0;right:0;bottom:0;padding:12px;
    background:linear-gradient(180deg,transparent,rgba(10,9,8,0.92));
    color:var(--text-bright);
  }
  .selected-card__cap .nm{ font: italic 400 16px/1 var(--serif); }
  .selected-card__cap .hd{ font:400 9.5px/1 var(--mono);letter-spacing:0.16em;color:var(--gilt);margin-top:4px;}
</style>
</head>
<body>

<div data-masthead></div>

<section class="atlas-hero">
  <div class="shell">
    <div class="eyebrow" style="margin-bottom:24px">An Atlas of Geometric Tattoo</div>
    <h1>The <em>Atlas</em></h1>
    <p>Sixty-two artists, plotted on a printed map of the world. Drag to pan, scroll to zoom, click a city to read its artists.</p>
  </div>
</section>

<section class="atlas-section">
  <div class="shell">
    <div class="atlas-grid">
      <div>
        <div class="atlas-controls" id="atlas-ctl">
          <button data-z="europe" class="active">Europe</button>
          <button data-z="americas">Americas</button>
          <button data-z="world">World</button>
        </div>
        <svg id="atlas-svg" class="atlas-svg"></svg>
        <div class="atlas-cap">Drag to pan · scroll to zoom · click a dot</div>
      </div>
      <aside class="atlas-index" id="atlas-index">
        <h3>By Country</h3>
        <div class="sub" id="index-sub">120+ artists · 27 countries</div>
        <div id="index-body"></div>
      </aside>
    </div>

    <div class="selected-panel" id="selected-panel" style="display:none">
      <div class="eyebrow">Selected location</div>
      <h3 id="sel-title" class="u-mt-md">—</h3>
      <div class="numeral u-mt-md" id="sel-sub">—</div>
      <div class="selected-grid" id="sel-grid"></div>
    </div>
  </div>
</section>

<div id="atlas-tt"></div>

<div data-colophon></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="js/omf.js"></script>
<script>
OMF.init('map');

// City coordinates (mirrors the legacy map.html data)
const COORDS = {
  "francesco.capro":{lat:51.5074,lng:-0.1278,label:"London, United Kingdom"},
  "swatidot.ttt":{lat:48.5932,lng:-0.6473,label:"Domfront 61700, Domfront 61700"}
};


const W = 960, H = 660;
const svg = d3.select('#atlas-svg').attr('viewBox', `0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet');
const projection = d3.geoNaturalEarth1().scale(170).translate([W/2, H/2]);
const pathFn = d3.geoPath().projection(projection);
const tt = document.getElementById('atlas-tt');

const gMap = svg.append('g');
const gDots = svg.append('g');

// graticule
gMap.append('path').datum(d3.geoGraticule()()).attr('class','atlas-graticule').attr('d', pathFn);

const zoomBehavior = d3.zoom().scaleExtent([0.8, 14]).on('zoom', e => {
  gMap.attr('transform', e.transform);
  gDots.attr('transform', e.transform);
  const k = e.transform.k;
  gDots.selectAll('.core').attr('r', 4.5 / Math.sqrt(k));
  gDots.selectAll('.glow').attr('r', 13 / Math.sqrt(k));
});
svg.call(zoomBehavior);

(async () => {
  const artists = await OMF.loadArtists();

  // group by location key
  const groups = {};
  artists.forEach(a => {
    const c = COORDS[a.instagram];
    if(!c) return;
    const key = `${Math.round(c.lat*2)},${Math.round(c.lng*2)}`;
    if(!groups[key]) groups[key] = { coords: c, label: c.label, artists: [] };
    groups[key].artists.push(a);
  });

  const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
  gMap.append('g').selectAll('path')
    .data(topojson.feature(world, world.objects.countries).features)
    .join('path').attr('class','atlas-country').attr('d', pathFn);

  Object.values(groups).forEach(g => {
    const [x,y] = projection([g.coords.lng, g.coords.lat]);
    if(!x || !y) return;
    const node = gDots.append('g').attr('class', `atlas-dot${g.artists.length>1?' multi':''}`).attr('transform', `translate(${x},${y})`);
    node.append('circle').attr('class','pulse').attr('r',5).style('animation-delay', `${Math.random()*2.5}s`);
    node.append('circle').attr('class','glow').attr('r',13);
    node.append('circle').attr('class','core').attr('r',4.5);
    if(g.artists.length>1){
      node.append('text').attr('text-anchor','middle').attr('dy','0.35em').attr('font-size','5.5px').attr('fill','#0a0908').attr('font-weight','bold').attr('pointer-events','none').text(g.artists.length);
    }
    node.on('mouseenter', () => {
      tt.style.display='block';
      tt.innerHTML = `<b>${g.label}</b>${g.artists.map(a=>`@${a.instagram}`).join('<br>')}`;
    }).on('mousemove', e => {
      tt.style.left=(e.clientX+14)+'px'; tt.style.top=(e.clientY-10)+'px';
    }).on('mouseleave', () => tt.style.display='none')
      .on('click', () => { tt.style.display='none'; showSelected(g); });
  });

  // Atlas index by country
  const byCountry = {};
  artists.forEach(a => { (byCountry[a.country] ||= []).push(a); });
  const sorted = Object.entries(byCountry).sort((a,b)=>b[1].length-a[1].length);
  document.getElementById('index-sub').textContent = `${artists.length} artists · ${sorted.length} countries`;
  document.getElementById('index-body').innerHTML = sorted.map(([country, list]) => `
    <div class="atlas-country-block">
      <div class="atlas-country-name">${country}<span>${list.length}</span></div>
      ${list.map(a => `
        <a class="atlas-artist-row" href="artists/${a.slug}.html">
          <img src="${a.image}" alt="${a.name}">
          <div>
            <div class="nm">${a.name}</div>
            <div class="hd">@${a.instagram}</div>
          </div>
          <div class="lc">${a.city || ''}</div>
        </a>`).join('')}
    </div>
  `).join('');

  // default zoom: Europe
  zoomTo('europe', false);
})();

function showSelected(g){
  const p = document.getElementById('selected-panel');
  p.style.display = 'block';
  document.getElementById('sel-title').textContent = g.label;
  document.getElementById('sel-sub').textContent = `${g.artists.length} artist${g.artists.length>1?'s':''}`;
  document.getElementById('sel-grid').innerHTML = g.artists.map(a => `
    <a class="selected-card" href="artists/${a.slug}.html">
      <img src="${a.image}" alt="${a.name}">
      <div class="selected-card__cap">
        <div class="nm">${a.name}</div>
        <div class="hd">@${a.instagram}</div>
      </div>
    </a>
  `).join('');
  p.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function zoomTo(region, animate=true){
  document.querySelectorAll('#atlas-ctl button').forEach(b=>b.classList.toggle('active', b.dataset.z===region));
  let cx, cy, k;
  if(region==='europe'){ [cx,cy]=projection([15,52]); k=4.0; }
  else if(region==='americas'){ [cx,cy]=projection([-80,5]); k=2.6; }
  else { cx=W/2; cy=H/2; k=1; }
  const t = (region==='world')
    ? d3.zoomIdentity
    : d3.zoomIdentity.translate(W/2 - k*cx, H/2 - k*cy).scale(k);
  if(animate) svg.transition().duration(700).ease(d3.easeCubicInOut).call(zoomBehavior.transform, t);
  else svg.call(zoomBehavior.transform, t);
}
document.getElementById('atlas-ctl').addEventListener('click', e => {
  const z = e.target.dataset.z; if(z) zoomTo(z);
});
</script>
</body>
</html>
