document.addEventListener("DOMContentLoaded", function() {
  var allArtists = window.ARTISTS;
  var countryFilter = document.getElementById("filter-country");
  var styleFilter = document.getElementById("filter-style");
  var container = document.getElementById("artists-container");

  // Populate filters
  var countries = [...new Set(allArtists.map(function(a){ return a.country }))].sort();
  var styles = [...new Set(allArtists.flatMap(function(a){ return a.styles }))].sort();
  countries.forEach(function(c) {
    var opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    countryFilter.appendChild(opt);
  });
  styles.forEach(function(s) {
    var opt = document.createElement("option");
    opt.value = s; opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
    styleFilter.appendChild(opt);
  });

  function render(artists) {
    container.innerHTML = artists.map(function(a) {
      return '<a href="artists/' + a.slug + '.html" class="artist-card">' +
        '<img src="' + a.image + '" alt="' + a.name + '" class="artist-card-image" loading="lazy">' +
        '<div class="artist-card-body">' +
          '<div class="artist-card-name">' + a.name + '</div>' +
          '<div class="artist-card-handle">@' + a.instagram + '</div>' +
          '<div class="artist-card-location">📍 ' + a.location + '</div>' +
          '<div class="artist-card-tags">' +
            a.styles.map(function(s){ return '<span class="tag">' + s + '</span>' }).join("") +
          '</div>' +
        '</div>' +
      '</a>';
    }).join("");
    // animate
    container.querySelectorAll(".artist-card").forEach(function(el) {
      el.style.opacity = "0";
      el.style.transform = "translateY(20px)";
      el.style.transition = "opacity .6s ease, transform .6s ease";
      setTimeout(function(){ el.style.opacity = "1"; el.style.transform = "translateY(0)"; }, 50);
    });
  }

  function applyFilters() {
    var c = countryFilter.value;
    var s = styleFilter.value;
    var filtered = allArtists;
    if (c) filtered = filtered.filter(function(a){ return a.country === c });
    if (s) filtered = filtered.filter(function(a){ return a.styles.includes(s) });
    render(filtered);
  }

  countryFilter.addEventListener("change", applyFilters);
  styleFilter.addEventListener("change", applyFilters);
  render(allArtists);
  console.log("Loaded " + allArtists.length + " artists (inline data)");

  // Mobile nav
  var toggle = document.querySelector(".nav-toggle");
  var links = document.querySelector(".nav-links");
  if (toggle && links) {
    toggle.addEventListener("click", function() {
      links.classList.toggle("open");
      toggle.textContent = links.classList.contains("open") ? "✕" : "☰";
    });
  }
});
</script>
</body>
</html>
