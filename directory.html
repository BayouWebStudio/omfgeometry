document.addEventListener("DOMContentLoaded", function() {
  var allArtists = window.ARTISTS;
  var filterBar = document.getElementById("filter-bar");
  var container = document.getElementById("artists-container");
  var countBadge = document.getElementById("artist-count-badge");
  var activeCountry = "";

  // Build country pill buttons
  var countries = [...new Set(allArtists.map(function(a){ return a.country }))].sort();
  countries.forEach(function(c) {
    var btn = document.createElement("button");
    btn.className = "filter-pill";
    btn.setAttribute("data-country", c);
    btn.textContent = c;
    filterBar.appendChild(btn);
  });

  function render(artists) {
    container.innerHTML = artists.map(function(a) {
      return '<a href="artists/' + a.slug + '.html" class="artist-card">' +
        '<img src="' + a.image + '" alt="' + a.name + '" class="artist-card-image" loading="lazy">' +
        '<div class="artist-card-overlay"></div>' +
        '<div class="artist-card-info">' +
          '<div class="artist-card-name">' + a.name + '</div>' +
          '<div class="artist-card-handle">@' + a.instagram + '</div>' +
          '<div class="artist-card-location">' + a.location + '</div>' +
        '</div>' +
      '</a>';
    }).join("");

    countBadge.textContent = artists.length + " Artist" + (artists.length !== 1 ? "s" : "");

    // Staggered reveal
    container.querySelectorAll(".artist-card").forEach(function(el, i) {
      el.style.opacity = "0";
      el.style.transform = "translateY(20px)";
      el.style.transition = "opacity .5s ease " + (i * 0.04) + "s, transform .5s ease " + (i * 0.04) + "s";
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          el.style.opacity = "1";
          el.style.transform = "translateY(0)";
        });
      });
    });
  }

  // Filter pill clicks
  filterBar.addEventListener("click", function(e) {
    var pill = e.target.closest(".filter-pill");
    if (!pill) return;
    activeCountry = pill.getAttribute("data-country");

    filterBar.querySelectorAll(".filter-pill").forEach(function(p) {
      p.classList.remove("active");
    });
    pill.classList.add("active");

    var filtered = activeCountry
      ? allArtists.filter(function(a) { return a.country === activeCountry; })
      : allArtists;
    render(filtered);
  });

  render(allArtists);

  // Mobile nav
  var toggle = document.querySelector(".nav-toggle");
  var links = document.querySelector(".nav-links");
  if (toggle && links) {
    toggle.addEventListener("click", function() {
      links.classList.toggle("open");
      toggle.textContent = links.classList.contains("open") ? "✕" : "☰";
    });
  }

  // Scroll reveal
  var revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add("revealed");
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
  document.querySelectorAll(".reveal").forEach(function(el) {
    revealObserver.observe(el);
  });
});

<script>
(function(){
  const canvas = document.getElementById('constellation-bg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15, alpha: Math.random()*0.6+0.2 });
    }
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    for (let i=0;i<stars.length;i++) {
      for (let j=i+1;j<stars.length;j++) {
        const dx=stars[i].x-stars[j].x, dy=stars[i].y-stars[j].y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist<150) { ctx.beginPath(); ctx.strokeStyle=`rgba(0,191,255,${0.15*(1-dist/150)})`; ctx.lineWidth=0.5; ctx.moveTo(stars[i].x,stars[i].y); ctx.lineTo(stars[j].x,stars[j].y); ctx.stroke(); }
      }
    }
    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(0,191,255,${s.alpha})`; ctx.fill(); s.x+=s.vx; s.y+=s.vy; if(s.x<0||s.x>W)s.vx*=-1; if(s.y<0||s.y>H)s.vy*=-1; });
    requestAnimationFrame(draw);
  }
  resize(); initStars(); draw();
  window.addEventListener('resize',()=>{resize();initStars();});
})();
</script>
