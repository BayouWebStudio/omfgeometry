<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Directory | OMF Geometry</title>
<link rel="stylesheet" href="css/monolith.css">
<style>
  .dir-hero {
    padding: clamp(56px, 8vw, 120px) var(--gutter) clamp(40px, 5vw, 64px);
    border-bottom: 1px solid var(--rule-strong);
  }
  .dir-hero__row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 32px;
  }
  .dir-hero__title {
    font: italic 400 clamp(56px, 9vw, 144px)/0.92 var(--serif);
    color: var(--text-bright);
    letter-spacing: -0.03em;
  }
  .dir-hero__title b { font-style: normal; font-weight: 400; }
  .dir-hero__count {
    text-align: right;
    font: 400 11px/1.6 var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-soft);
  }
  .dir-hero__count b { color: var(--gilt); display: block; font: italic 400 56px/1 var(--serif); margin-bottom: 8px; }
  .dir-hero__lede {
    margin-top: 28px;
    font: italic 400 clamp(20px, 2.2vw, 28px)/1.4 var(--serif);
    color: var(--text-bright);
    max-width: 56ch;
  }
  @media (max-width: 700px) {
    .dir-hero__row { grid-template-columns: 1fr; }
    .dir-hero__count { text-align: left; }
  }
  .dir-search {
    width: 100%;
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--rule-strong);
    padding: 14px 0;
    font: italic 400 22px/1 var(--serif);
    color: var(--text-bright);
    outline: none;
    margin-bottom: 24px;
  }
  .dir-search:focus { border-bottom-color: var(--gilt); }
  .dir-search::placeholder { color: var(--text-mute); }
  .dir-empty {
    padding: 80px 0;
    text-align: center;
    font: italic 400 24px var(--serif);
    color: var(--text-mute);
  }
</style>
</head>
<body>

<div data-masthead></div>

<section class="dir-hero">
  <div class="shell">
    <div class="dir-hero__row">
      <div>
        <div class="eyebrow" style="margin-bottom:24px">The Directory · Volume One</div>
        <h1 class="dir-hero__title">The <em>Directory</em></h1>
      </div>
      <div class="dir-hero__count">
        <b id="count">120+</b>
        <div>Artists</div>
        <div style="margin-top:18px"><b style="font-size:32px" id="countries">27</b></div>
        <div>Countries</div>
      </div>
    </div>
    <p class="dir-hero__lede">A standing index of the geometric tattooists we follow most closely. Sorted, filterable, hand-curated. <em>No fees. No rankings. No paid placement.</em></p>
  </div>
</section>

<section class="shell" style="padding-top: clamp(32px,4vw,56px)">
  <input id="search" class="dir-search" placeholder="Search by name, city, country, or @handle…" />
  <div class="filterbar">
    <span class="filterbar__label">By Country</span>
    <div id="filters" style="display:flex;flex-wrap:wrap"></div>
  </div>
  <div class="directory-grid" id="grid"></div>
  <div id="empty" class="dir-empty" style="display:none">No artists match.</div>
</section>

<div data-colophon></div>

<script src="js/omf.js"></script>
<script>
  OMF.init('directory');
  (async () => {
    const artists = await OMF.loadArtists();
    const grid = document.getElementById('grid');
    const filters = document.getElementById('filters');
    const search = document.getElementById('search');
    const empty = document.getElementById('empty');

    document.getElementById('count').textContent = artists.length;
    document.getElementById('countries').textContent = new Set(artists.map(a => a.country)).size;

    // Build filters from country counts
    const countries = {};
    artists.forEach(a => { countries[a.country] = (countries[a.country]||0) + 1; });
    const sortedCountries = Object.entries(countries).sort((a,b)=> b[1]-a[1]);

    let activeCountry = '';
    let q = '';

    function pill(label, value, count){
      const b = document.createElement('button');
      b.className = 'pill' + (value === activeCountry ? ' active' : '');
      b.textContent = count != null ? `${label} · ${count}` : label;
      b.onclick = () => { activeCountry = value; render(); renderFilters(); };
      return b;
    }
    function renderFilters(){
      filters.innerHTML = '';
      filters.appendChild(pill('All', '', artists.length));
      sortedCountries.forEach(([c,n]) => filters.appendChild(pill(c, c, n)));
    }
    renderFilters();

    function render(){
      const filtered = artists.filter(a => {
        if(activeCountry && a.country !== activeCountry) return false;
        if(q){
          const s = q.toLowerCase();
          return [a.name, a.city, a.country, a.instagram].some(v => (v||'').toLowerCase().includes(s));
        }
        return true;
      });
      empty.style.display = filtered.length ? 'none' : 'block';
      grid.innerHTML = filtered.map((a, i) => `
        <a class="dir-card" href="artists/${a.slug}.html">
          <div class="dir-card__media">
            <img src="${a.image}" alt="${a.name}" loading="lazy">
            <div class="dir-card__num">№ ${String(i+1).padStart(3,'0')}</div>
            <div class="dir-card__country">${a.country}</div>
          </div>
          <div class="dir-card__name">${a.name}</div>
          <div class="dir-card__meta">
            <span>@${a.instagram}</span>
            <span>${a.city || '—'}</span>
          </div>
        </a>
      `).join('');
    }

    search.addEventListener('input', e => { q = e.target.value; render(); });
    render();
  })();
</script>
</body>
</html>
